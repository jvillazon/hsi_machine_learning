name: hsi_machine_learning
channels:
  - pytorch
  - conda-forge
  - defaults
dependencies:
  - python=3.10
  - numpy>=1.26.0
  - pandas>=1.5.3
  - matplotlib>=3.6.3
  - scipy>=1.10.1
  - scikit-image>=0.19.3
  - scikit-learn>=1.1.3
  - tqdm>=4.65.0
  - tifffile
  - seaborn>=0.12.2
  - statsmodels>=0.14.0
  - joblib>=1.2.0
  - sympy>=1.11.1
  # CPU-only PyTorch. Including 'cpuonly' ensures conda selects the CPU build from the pytorch channel.
  - pytorch>=2.0.1
  - torchvision>=0.15.2
  - torchaudio>=2.0.2
  - cpuonly
  - pip
  - pip:
    - typing-extensions>=4.7.1
    - rampy

# Notes:
# - These versions use >= for compatibility with newer packages (especially numpy for .npz file compatibility).
# - To create the environment:
#   conda env create -f environment.yml
#   conda activate hsi_machine_learning
# - To update an existing environment:
#   conda env update -f environment.yml --prune
# - If conda cannot resolve the exact PyTorch+CPU packages on your platform, run the
#   official install instructions from https://pytorch.org and adjust the environment accordingly.