name: hsi_machine_learning
channels:
  - pytorch
  - nvidia
  - conda-forge
  - defaults
dependencies:
  - python=3.10
  - numpy>=2.2.6
  - pandas>=2.3.3
  - matplotlib>=3.10.0
  - scipy>=1.15.2
  - scikit-image>=0.25.2
  - scikit-learn>=1.7.2
  - tqdm>=4.67.1
  - tifffile>=2025.5.10
  - seaborn>=0.13.2
  - statsmodels>=0.14.6
  - joblib>=1.5.3
  - sympy>=1.14.0
  - shap>=0.49.0
  - optuna>=4.0.0
  # GPU-enabled PyTorch with CUDA 13.0
  - pytorch  # version will be resolved from the PyTorch channel for CUDA 13.0
  - torchvision
  - torchaudio
  # CUDA 13.0 support (install via pip below if not available via conda)
  - pip
  - pip:
      - torch --index-url https://download.pytorch.org/whl/cu130
      - torchvision --index-url https://download.pytorch.org/whl/cu130
      - torchaudio
      - typing-extensions>=4.15.0
      - openpyxl>=3.1.5

# Notes:
# - These versions use >= for compatibility with newer packages (especially numpy for .npz file compatibility).
# - To create the environment:
#   conda env create -f environment.yml
#   conda activate hsi_machine_learning
# - To update an existing environment:
#   conda env update -f environment.yml --prune
# - If conda cannot resolve the exact PyTorch+GPU packages on your platform, run the
#   official install instructions from https://pytorch.org and adjust the environment accordingly.